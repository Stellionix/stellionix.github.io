<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellionix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f1115;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 32px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        p {
            font-size: 1.1rem;
            color: #c9d1d9;
        }

        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            background: #2f81f7;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Stellionix</h1>
    <p>Minecraft plugins, tools and creative projects.</p>
    <a class="button" href="https://github.com/Stellionix">Voir l’organisation GitHub</a>
</div>
</body>
</html>
