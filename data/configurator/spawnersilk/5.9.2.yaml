#####################################################################################
# SpawnerSilk Configuration
#
# Project pages:
#   https://dev.bukkit.org/projects/spawnersilk
#   https://www.curseforge.com/minecraft/bukkit-plugins/spawnersilk
#
# Community support:
#   https://discordapp.com/invite/jCsvJxS
#
# Run '/sps reload' after editing this file to apply your changes.
#####################################################################################

localization:
  # Language file loaded from plugins/SpawnerSilk/localization/<language>.json.
  # The plugin currently includes en_us only.
  language: en_us

updates:
  # Automatically download and install supported updates when available.
  auto-download: true

mining:
  # Require Silk Touch to break a spawner.
  require-silk-touch-to-break: false

  # Require Silk Touch for a spawner item to drop.
  require-silk-touch-to-drop: true

  # Minimum pickaxe tier required to collect a spawner.
  # 0 = any tool
  # 1 = wooden pickaxe or better
  # 2 = stone pickaxe or better
  # 3 = iron pickaxe or better
  # 4 = golden pickaxe or better
  # 5 = diamond pickaxe or better
  # 6 = netherite pickaxe or better
  required-pickaxe-tier: 5

drops:
  # Spawner drop mode:
  # 0 = drop a typed spawner item
  # 1 = drop a basic spawner plus a spawn egg
  mode: 0

  # Chance, in percent, to drop a spawner when it is broken.
  spawner-chance: 100

  # Chance, in percent, to drop a spawn egg when mode = 1.
  egg-chance: 100

  # Chance, in percent, to drop a spawner after an explosion.
  explosion-chance: 10

  # Send drops directly to the player's inventory when possible.
  to-inventory: false

  # Allow spawners to drop when the player is in Creative mode.
  allow-in-creative: false

interaction:
  # Allow players to change spawner types with spawn eggs.
  allow-egg-modification: true

  # Consume the spawn egg when changing a spawner type.
  consume-egg: true

experience:
  # Drop experience when a spawner is mined.
  drop-from-spawners: false

overlay:
  # Show an overlay while the player is looking at a spawner.
  enabled: true

  # Duration, in seconds, before the overlay disappears.
  duration-seconds: 10

feedback:
  # Show player-facing error messages when breaking spawners.
  break-errors: true

  # Show a success message after placing a spawner.
  place-success: false

  # Show player-facing error messages during spawner interactions.
  interact-errors: true

  # Show a success message after changing a spawner with a spawn egg.
  interact-success: false

restrictions:
  # Spawner types that can never be collected.
  # Use uppercase entity names with underscores.
  blacklist:
    - BOAT_SPAWNER